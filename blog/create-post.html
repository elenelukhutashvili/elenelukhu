<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post - Paulina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="container header-flex">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" alt="Paulina" class="avatar">
            <nav class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="blog.html" class="nav-link">Blog</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="newsletter.html" class="nav-link">Newsletter</a>
                <button class="theme-toggle">☀️</button>
            </nav>
            <button class="menu-toggle" id="menuBtn">☰</button>
        </div>
    </header>

    <main class="container" style="margin-top: 40px;">
        <h1>Write a New Blog Post</h1>
        <p>Fill out the form below to add a new post to the blog grid instantly.</p>

        <form id="newPostForm" style="margin-top: 24px;">
            <div class="form-group">
                <label for="postTitle">Post Title</label>
                <input type="text" id="postTitle" class="form-input" required placeholder="e.g., My Journey into Cyber Security">
            </div>

            <div class="form-group">
                <label for="postExcerpt">Short Description (Excerpt)</label>
                <input type="text" id="postExcerpt" class="form-input" required placeholder="A brief wrap-up of your post...">
            </div>

            <div class="form-group">
                <label for="postContent">Full Content</label>
                <textarea id="postContent" class="form-input" rows="8" required placeholder="Write your full story here..." style="font-family: inherit; resize: vertical;"></textarea>
            </div>

            <button type="submit" class="btn-primary">Publish Post</button>
            <div id="publishFeedback" class="feedback-msg"></div>
        </form>
    </main>

    <script src="main.js"></script>
</body>
</html>
